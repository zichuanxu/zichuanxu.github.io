# Site settings
locale                   : "en-US"
title                    : "Zichuan Xu"
name                     : "Zichuan Xu"
description              : "Zichuan Xu's homepage — research notes, engineering notes, and LeetCode solutions."
url                      : https://zichuanxu.github.io
baseurl                  : ""
repository               : "zichuanxu/zichuanxu.github.io"

# Build settings
future                   : true            # build posts dated today/future
encoding                 : "utf-8"
timezone                 : Etc/UTC
markdown                 : kramdown
highlighter              : rouge
excerpt_separator        : "\n\n"
permalink                : /:categories/:title/

# Markdown processing (kept verbatim so code highlighting is unchanged)
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Reading files
include:
  - _pages
  - files
exclude:
  - .bundle
  - .github
  - docs
  - .superpowers
  - vendor
  - node_modules
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - Dockerfile
  - docker-compose.yaml

# Plugins (GitHub Pages --safe: only whitelisted plugins run)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
